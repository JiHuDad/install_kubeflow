# K3s 레지스트리 미러 설정 — 폐쇄망용
# 외부 레지스트리를 localhost:5000 로 미러링한다.
mirrors:
  "ghcr.io":
    endpoint:
      - "http://localhost:5000"
  "docker.io":
    endpoint:
      - "http://localhost:5000"
  "quay.io":
    endpoint:
      - "http://localhost:5000"
  "registry.k8s.io":
    endpoint:
      - "http://localhost:5000"
  "k8s.gcr.io":
    endpoint:
      - "http://localhost:5000"

configs:
  "localhost:5000":
    tls:
      insecure_skip_verify: true
