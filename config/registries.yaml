# K3s 레지스트리 미러 설정 — 폐쇄망용
# /etc/rancher/k3s/registries.yaml 에 복사하여 사용한다.
# K3s 재시작 후 적용: sudo systemctl restart k3s
#
# 참고: https://docs.k3s.io/installation/private-registry

mirrors:
  "ghcr.io":
    endpoint:
      - "http://localhost:5000"
  "docker.io":
    endpoint:
      - "http://localhost:5000"
  "quay.io":
    endpoint:
      - "http://localhost:5000"
  "registry.k8s.io":
    endpoint:
      - "http://localhost:5000"
  "k8s.gcr.io":
    endpoint:
      - "http://localhost:5000"

configs:
  "localhost:5000":
    tls:
      insecure_skip_verify: true
